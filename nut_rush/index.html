<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <title>Nut Rush! Deluxe</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* changed to start to make room for controls */
            min-height: 100vh;
            margin: 0;
            background-color: #a0d9ef; /* Light sky blue */
            font-family: 'Comic Sans MS', 'Arial', cursive, sans-serif; /* Friendlier font */
            overflow: hidden; /* Prevent scrollbars and bouncing on iOS */
            touch-action: none; /* Crucial for custom touch controls */
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: env(safe-area-inset-top, 10px); /* iPhone notch support */
            position: relative;
        }

        canvas {
            border: 5px solid #6d4c41; /* Darker Brown border */
            background-color: #e0f7fa; /* Lighter blue canvas bg */
            display: block;
            margin: 0 auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            max-width: 100%; /* Responsive width */
            /* Scale down slightly on very small default heights if needed, but 700x500 is ok for iPad */
        }
        #ui {
            margin-top: 10px;
            font-size: 22px;
            font-weight: bold;
            color: #4e342e; /* Dark brown text */
            width: 700px; /* Match canvas width */
            max-width: 95vw;
            display: flex;
            justify-content: space-between;
            text-shadow: 1px 1px #fff;
        }
        #title {
            font-size: 36px;
            color: #d2691e; /* Chocolate color */
            margin-bottom: 5px;
            font-weight: bold;
            text-shadow: 2px 2px #fff;
        }
         #instructions {
            font-size: 14px;
            color: #6a1b9a; /* Purple */
            margin-bottom: 10px;
            text-align: center;
         }
        .score-display {
            transition: transform 0.1s ease-out, color 0.1s ease-out;
        }
        .score-pop {
            transform: scale(1.2);
            color: #ffeb3b; /* Yellow pop */
        }
        .score-bad-pop {
             transform: scale(1.1);
             color: #f44336; /* Red pop */
        }

        /* Centralized Messages */
        .overlay-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            color: white;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none; /* Hidden initially */
            text-shadow: 3px 3px #555;
            pointer-events: none; /* Let clicks pass through if needed */
        }
         #countdown { font-size: 90px; }
         #pauseIndicator { font-size: 60px; }
         #gameOver { 
            font-size: 48px; 
            pointer-events: auto; /* Buttons inside need to be clickable */
         }

         #gameOver button {
            font-size: 24px;
            padding: 10px 20px;
            margin-top: 20px;
            cursor: pointer;
            border: none;
            background-color: #4CAF50; /* Green */
            color: white;
            border-radius: 8px;
            font-family: 'Comic Sans MS', 'Arial', cursive, sans-serif;
         }
         #gameOver button:hover {
            background-color: #45a049;
         }
         #finalScore {
            font-size: 28px;
            margin-top: 15px;
            display: block; /* Ensure it takes its own line */
            color: #ffff00; /* Yellow final score */
         }
          #winner {
             font-size: 32px;
             margin-top: 10px;
             color: #ff9800; /* Orange winner text */
          }

        /* --- Touch Controls UI --- */
        #touch-controls {
            display: flex; /* Always display for iPads/tablets too */
            justify-content: space-between;
            width: 700px;
            max-width: 95vw;
            margin-top: 15px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        .player-controls {
            display: flex;
            gap: 15px;
        }

        .touch-btn {
            background-color: rgba(255, 255, 255, 0.6);
            border: 3px solid rgba(0,0,0,0.2);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            font-size: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none; /* Prevent text selection */
            -webkit-user-select: none;
            color: #4e342e;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .touch-btn:active {
            background-color: rgba(255, 255, 255, 0.9);
            transform: scale(0.95);
        }

        /* Color code for players */
        #btn-p1-left, #btn-p1-right { border-color: #D2691E; color: #D2691E;}
        #btn-p2-left, #btn-p2-right { border-color: #A0522D; color: #A0522D;}
        
        .pause-btn-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btn-pause {
            width: 50px;
            height: 50px;
            font-size: 20px;
            border-radius: 10px;
            background-color: rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>
    <div class="game-container">
        <div id="title">🌰 Nut Rush! Deluxe 🌰</div>
        <div id="instructions">
            P1 (Collets): A/D or Touch | P2 (Willy): Left/Right or Touch
        </div>
        
        <div id="ui">
            <span id="score1" class="score-display">Collets: 0</span>
            <span id="timer">Time: 60</span>
            <span id="score2" class="score-display">Willy: 0</span>
        </div>

        <canvas id="gameCanvas" width="700" height="500"></canvas>

        <!-- Touch Controls Row -->
        <div id="touch-controls">
            <!-- Player 1 (Collets) Controls -->
            <div class="player-controls">
                <div class="touch-btn" id="btn-p1-left">←</div>
                <div class="touch-btn" id="btn-p1-right">→</div>
            </div>
            
            <!-- Pause Button -->
            <div class="pause-btn-container">
                 <div class="touch-btn" id="btn-pause">⏸</div>
            </div>

            <!-- Player 2 (Willy) Controls -->
            <div class="player-controls">
                <div class="touch-btn" id="btn-p2-left">←</div>
                <div class="touch-btn" id="btn-p2-right">→</div>
            </div>
        </div>

        <!-- Central Messages -->
        <div id="countdown" class="overlay-message">3</div>
        <div id="pauseIndicator" class="overlay-message">Paused</div>
        <div id="gameOver" class="overlay-message">
            Nut-tastic Effort!<br>
            <span id="finalScore"></span>
            <span id="winner"></span><br>
            <button onclick="restartGame()">Play Again?</button>
        </div>
    </div>

    <!-- Audio Elements (Replace # with actual paths if needed) -->
    <audio id="catchSound" src="catch.wav" preload="auto"></audio>
    <audio id="powerupSound" src="powerup.wav" preload="auto"></audio>
    <audio id="bonkSound" src="bonk.wav" preload="auto"></audio>
    <audio id="music" src="music.mp3" loop preload="auto"></audio>

    <script src="game.js"></script>
</body>
</html>
