<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Willy & Collets' Game Hub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #ff6b6b;
            text-shadow: 2px 2px 0 #fff;
            margin-bottom: 2rem;
            padding: 0 20px;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 500px;
        }

        .game-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            text-decoration: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 4px solid transparent;
        }

        .game-btn:hover, .game-btn:active {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .btn-nut-rush {
            border-color: #D2691E;
            color: #D2691E;
        }

        .btn-candy-coaster {
            border-color: #E91E63;
            color: #E91E63;
        }

        .game-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .game-desc {
            font-size: 1.1rem;
            color: #666;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>🎮 Willy & Collets' Games 🎮</h1>
    
    <div class="menu-container">
        
        <a href="nut_rush/index.html" class="game-btn btn-nut-rush">
            <div class="icon">🌰</div>
            <div class="game-title">Nut Rush! Deluxe</div>
            <div class="game-desc">Catch the falling nuts before time runs out!</div>
        </a>

        <a href="candy_coaster/index.html" class="game-btn btn-candy-coaster">
            <div class="icon">🍬</div>
            <div class="game-title">Candy Coaster</div>
            <div class="game-desc">A sweet and fast-paced adventure!</div>
        </a>

    </div>

</body>
</html>
